name: Android Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 セットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Android SDK セットアップ
        uses: android-actions/setup-android@v3

      - name: Rust ツールチェーン セットアップ
        uses: dtolnay/rust-toolchain@stable

      - name: Android Rust ターゲット追加
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: 依存関係インストール
        run: npm install

      - name: Android プロジェクト初期化
        run: npm run tauri:android:init

      - name: Keystore 配置
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/gen/android/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Android リリースビルド
        run: npm run tauri:build:android:release
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: GitHub Release へアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
